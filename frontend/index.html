<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cart - Home</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        header {
            background: #35424a;
            color: #ffffff;
            padding: 10px 0;
            text-align: center;
        }
        .container {
            width: 90%;
            max-width: 1200px;
            margin: 20px auto;
            overflow: auto;
        }
        .card {
            background: #ffffff;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin: 20px;
            padding: 20px;
            float: left;
            width: calc(33.333% - 40px);
            box-sizing: border-box;
        }
        @media (max-width: 768px) {
            .card {
                width: calc(50% - 40px);
            }
        }
        @media (max-width: 480px) {
            .card {
                width: calc(100% - 40px);
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to My Cart</h1>
    </header>
    <div class="container">
        <div class="card">
            <h2>Featured Product 1</h2>
            <p>Description of product 1.</p>
        </div>
        <div class="card">
            <h2>Featured Product 2</h2>
            <p>Description of product 2.</p>
        </div>
        <div class="card">
            <h2>Featured Product 3</h2>
            <p>Description of product 3.</p>
        </div>
    </div>
</body>
</html>
